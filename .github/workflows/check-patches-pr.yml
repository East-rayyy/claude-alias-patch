name: Check Patches (PR)
run-name: "Check patches — PR #${{ github.event.pull_request.number }}"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-patches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Fetch latest Claude Code
        run: |
          npm pack @anthropic-ai/claude-code@latest
          mkdir -p test-pkg
          tar -xzf anthropic-ai-claude-code-*.tgz -C test-pkg --strip-components=1
          head -5 test-pkg/cli.js

      - name: Run patcher
        run: python3 lib/patcher.py test-pkg/cli.js test-pkg/cli-patched.js
